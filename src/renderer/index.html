<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicBrainz Metadata Sync</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <main class="app-shell">
    <section class="folder-panel" aria-label="Folder controls">
      <div class="panel-header">
        <h2>Folder Actions</h2>
      </div>
      <div class="panel-actions">
        <button id="chooseFolderButton" type="button">Choose Folder</button>
        <button id="applyButton" type="button" disabled>Apply Changes</button>
        <span id="folderStatus" aria-live="polite">Choose a folder to begin.</span>
      </div>
    </section>

    <section class="metadata-panel" aria-label="Rename metadata">
      <div class="panel-header">
        <h2>Fetch Metadata From</h2>
      </div>
      <div class="panel-actions">
        <button id="fetchMusicBrainzButton" type="button">MusicBrainz</button>
        <span id="metadataStatus">Metadata not loaded.</span>
      </div>
    </section>

    <section class="file-panel" aria-label="Audio file preview">
      <div class="file-panel-header">
        <h2>Preview</h2>
        <span id="fileCount">0 files</span>
      </div>
      <div class="table-wrap">
        <table class="preview-table">
          <thead>
            <tr>
              <th>Current file</th>
              <th>Target file</th>
              <th class="metadata-header">Metadata</th>
            </tr>
          </thead>
          <tbody id="fileTableBody">
            <tr>
              <td colspan="3" class="empty-state">Choose a folder to preview audio files.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="applyConfirmDialog" class="confirm-dialog" aria-labelledby="applyConfirmTitle">
    <form method="dialog" class="confirm-dialog-panel">
      <div>
        <h2 id="applyConfirmTitle">Apply changes?</h2>
        <p>This action cannot be undone.</p>
      </div>
      <div class="confirm-dialog-actions">
        <button id="cancelApplyButton" class="secondary-button" type="submit" value="cancel">Cancel</button>
        <button id="confirmApplyButton" class="danger-button" type="submit" value="confirm">Apply Changes</button>
      </div>
    </form>
  </dialog>

  <dialog id="errorDialog" class="confirm-dialog error-dialog" aria-labelledby="errorDialogTitle">
    <form method="dialog" class="confirm-dialog-panel">
      <div>
        <h2 id="errorDialogTitle">Something went wrong</h2>
        <p id="errorDialogMessage"></p>
      </div>
      <div class="confirm-dialog-actions">
        <button id="closeErrorDialogButton" class="secondary-button" type="submit" value="close">OK</button>
      </div>
    </form>
  </dialog>

  <script src="./renderer.js"></script>
</body>

</html>
