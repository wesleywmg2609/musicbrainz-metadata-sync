<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Metadata Sync</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Folder controls">
        <div>
          <h1>Music Metadata Sync</h1>
          <p id="folderLabel">No folder selected</p>
        </div>
        <div class="toolbar-actions">
          <button id="chooseFolderButton" type="button">Choose Folder</button>
          <button id="applyButton" type="button" disabled>Apply Changes</button>
        </div>
      </section>

      <section class="metadata-panel" aria-label="Rename metadata">
        <label>
          Artist
          <input id="artistInput" type="text" placeholder="Artist name">
        </label>
        <label>
          Album
          <input id="albumInput" type="text" placeholder="Album title">
        </label>
        <div class="spotify-actions">
          <button id="fetchSpotifyButton" type="button">Fetch Spotify</button>
          <span id="spotifyStatus">Spotify metadata not loaded.</span>
        </div>
        <div class="folder-preview">
          <span>Folder Preview</span>
          <strong id="folderPreviewName">Selected folder name stays unchanged until artist and album are set.</strong>
        </div>
      </section>

      <section class="file-panel" aria-label="Audio file preview">
        <div class="file-panel-header">
          <h2>Preview</h2>
          <span id="fileCount">0 files</span>
        </div>
        <div class="table-wrap">
          <table class="preview-table">
            <thead>
              <tr>
                <th>Current file</th>
                <th>Target file</th>
                <th>Metadata</th>
              </tr>
            </thead>
            <tbody id="fileTableBody">
              <tr>
                <td colspan="3" class="empty-state">Choose a folder to preview audio files.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
